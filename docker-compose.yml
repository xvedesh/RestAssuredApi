services:
  json-server:
    build: ./server
    ports:
      - "3001:3000"   # optional: lets you hit the server from host
    volumes:
      # dev-friendly: edits to clients.json instantly apply in the container
      - ./server/clients.json:/usr/src/app/clients.json:rw

  api-tests:
    build: .
    depends_on:
      - json-server
    environment:
      BASE_URI: http://json-server:3000
      CUCUMBER_TAGS: "@ClientData"

